version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/portal
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: deps
      include: scope
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope

  - package-ecosystem: docker
    directory: /apps/portal
    schedule:
      interval: weekly
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: docker
      include: scope
