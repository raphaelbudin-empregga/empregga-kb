name: Mutation Testing (Stryker)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1' # Segunda-feira 04h UTC

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install
        run: cd apps/portal && npm ci

      - name: Run Stryker
        run: cd apps/portal && npx stryker run
        env:
          STRYKER_DASHBOARD_API_KEY: ${{ secrets.STRYKER_DASHBOARD_API_KEY }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-report
          path: apps/portal/reports/mutation/
