name: Test Impact (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/portal/**'

jobs:
  test-changed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install
        run: cd apps/portal && npm ci

      - name: Run only affected tests
        run: cd apps/portal && npx vitest --changed origin/main --run
